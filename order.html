<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initialize Mission - Ventured Skies LLC</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/screen.css" media="screen">
</head>

<body>

  <header class="site-header">
    <div class="brand-bar">
      <div class="logo-wrap">
        <img src="media/Ventured Skies Logo.png" alt="Ventured Skies Logo" class="logo">
        <div class="site-title">VENTURED SKIES</div>
      </div>
      <div class="mobile-toggle">☰</div>
      <nav class="top-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="aboutUs.html">About Us</a></li>
          <li><a href="ourServices.html">Services</a></li>
          <li><a href="works.html">Works</a></li>
          <li><a href="contactUs.html">Contact</a></li>
          <li><a href="order.html" class="active nav-cta">Order Now</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero-page hero-bg-order">
    <div class="hero-overlay">
      <div class="hero-content">
        <h1>Initialize Mission</h1>
        <div class="underline"></div>
        <p class="hero-sub">Secure Flight Authorization & Project Scoping</p>
      </div>
    </div>
  </section>

  <main>
    <div class="contact-container">
      
      <div class="contact-form-card glass-panel" style="max-width: 800px; margin: 0 auto;">
        <h2>Project Parameters</h2>
        <form id="order-form" action="https://api.web3forms.com/submit" method="POST">
          
          <input type="hidden" name="access_key" value="435cc763-84bb-44ec-98fb-fd8cd10ffbfc">
          <input type="hidden" name="subject" value="URGENT: New Mission Request - Ventured Skies">
          <input type="hidden" name="redirect" value="https://yourdomain.com/thankYou.html">
          <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

          <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
              <label>Contact Name</label>
              <input type="text" name="name" placeholder="Representative" required class="glass-input">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" placeholder="Email@company.com" required class="glass-input">
            </div>
          </div>

          <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div class="form-group">
              <label>Mission Type</label>
              <select name="service_tier" required class="glass-input">
                <option value="" disabled selected>Select Flight Package...</option>
                <option value="Media Core">Media Core (Photo/Video)</option>
                <option value="Enterprise Vision">Enterprise Vision (Mapping/Progression)</option>
                <option value="Industrial Data">Industrial Data (Lidar/Thermal)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Target Date</label>
              <input type="date" name="mission_date" class="glass-input">
            </div>
          </div>

          <div class="form-group" style="margin-top: 20px;">
            <label>Deployment Coordinates / Address</label>
            <input type="text" name="location" placeholder="Site Address or GPS Coordinates" required class="glass-input">
          </div>

          <div class="form-group" style="margin-top: 20px;">
            <label>Mission Objectives</label>
            <textarea name="message" rows="5" placeholder="Describe the site terrain, specific deliverables needed, and any airspace restrictions..." class="glass-input" required></textarea>
          </div>

          <button type="submit" class="submit-btn magnet" id="order-submit-btn">Authorize Mission</button>
          <div id="order-result" class="form-result"></div>
        </form>
      </div>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/style.js"></script>
</body>
</html>
