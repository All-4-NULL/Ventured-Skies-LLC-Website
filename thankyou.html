<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mission Received | Ventured Skies LLC</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/screen.css">


  <style>
    body { background-color: #050505; }
  /*--- STyling specificlly for the thank you page --- */
    .thank-you-wrapper {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        
        background: radial-gradient(circle at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%), 
                    url('media/cliff-pano.jpg') no-repeat center center/cover;
        position: relative;
    }

    .thank-you-content {
        position: relative;
        z-index: 2;
        background: rgba(255, 255, 255, 0.03);
        padding: 60px 40px;
        border-radius: 15px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 650px;
        margin: 20px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        opacity: 0; /* Handled by GSAP */
        transform: translateY(30px);
    }

    h1 { 
        color: #ff6b00; 
        font-family: 'Cinzel', serif; 
        font-size: 3.5rem; 
        margin-bottom: 20px; 
        text-transform: uppercase;
        letter-spacing: 4px;
    }

    p { 
        color: #cccccc; 
        font-size: 1.1rem; 
        margin-bottom: 40px; 
        line-height: 1.8;
        font-weight: 300;
    }

    .home-btn {
        padding: 18px 45px;
        background: #ff6b00;
        color: white;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 2px;
        text-decoration: none;
        border-radius: 4px;
        transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        display: inline-block;
    }

    .home-btn:hover { 
        background: white; 
        color: #050505; 
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255, 107, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="thank-you-wrapper">
    <div class="thank-you-content">
        <h1>Mission Received</h1>
        <p>Your request has successfully cleared for takeoff. Our flight team will review your project details and get in touch shortly to confirm your mission coordinates.</p>
        <a href="index.html" class="home-btn magnet">Return To Base</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/style.js"></script>
  <script>
    // Specific entrance for the Thank You card
    gsap.to(".thank-you-content", {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: "power4.out",
        delay: 0.3
    });
  </script>

</body>
</html>
